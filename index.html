# index.html

```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>نظام الفواتير</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4">

  <div class="card shadow-sm">

    <div class="card-body">

      <h2 class="mb-4">نظام الفواتير</h2>

      <div class="mb-3">
        <label class="form-label">العميل</label>
        <select id="customerSelect" class="form-select"></select>
      </div>

      <div class="mb-3">
        <label class="form-label">التاريخ</label>
        <input type="date" id="invoiceDate" class="form-control">
      </div>

      <div class="table-responsive">

        <table class="table table-bordered">

          <thead>

            <tr>
              <th>المنتج</th>
              <th>الكمية</th>
              <th>السعر</th>
              <th>الضريبة</th>
              <th>الإجمالي</th>
            </tr>

          </thead>

          <tbody id="itemsBody"></tbody>

        </table>

      </div>

      <button class="btn btn-success mb-3" onclick="addRow()">
        إضافة صنف
      </button>

      <div class="mb-3">
        <strong>الإجمالي:</strong>
        <span id="finalTotal">0.00</span>
      </div>

      <button class="btn btn-primary" onclick="saveInvoice()">
        حفظ الفاتورة
      </button>

    </div>

  </div>

</div>

<script>

const API_URL = "PUT_YOUR_DEPLOYMENT_URL_HERE";

let allProducts = [];
let allCustomers = [];
let currentItems = [];

async function apiCall(action, method = "GET", body = null) {

  const url =
    method === "GET"
      ? `${API_URL}?action=${action}`
      : API_URL;

  const options = {
    method
  };

  if (body) {
    options.body = JSON.stringify(body);
  }

  const res = await fetch(url);

  const text = await res.text();

  try {

    return JSON.parse(text);

  } catch(err) {

    console.error(text);

    alert("Server Error");

    return null;
  }
}

async function loadCustomers() {

  const data = await apiCall("getCustomers");

  if (!data || !data.success) return;

  allCustomers = data.customers;

  const select = document.getElementById("customerSelect");

  select.innerHTML = `<option value="">اختر العميل</option>`;

  allCustomers.forEach(c => {

    select.innerHTML += `
      <option value="${c.customer_id}">
        ${c.customer_name}
      </option>
    `;
  });
}

async function loadProducts() {

  const data = await apiCall("getProducts");

  if (!data || !data.success) return;

  allProducts = data.products;
}

function addRow() {

  const tbody = document.getElementById("itemsBody");

  const rowIndex = currentItems.length;

  let options = "";

  allProducts.forEach(p => {

    options += `
      <option value="${p.id}">
        ${p.name}
      </option>
    `;
  });

  tbody.innerHTML += `

    <tr id="row-${rowIndex}">

      <td>
        <select class="form-select" onchange="selectProduct(${rowIndex}, this.value)">
          <option value="">اختر</option>
          ${options}
        </select>
      </td>

      <td>
        <input type="number" class="form-control qty" value="1" onchange="updateRow(${rowIndex})">
      </td>

      <td>
        <input type="number" class="form-control price" value="0" onchange="updateRow(${rowIndex})">
      </td>

      <td>
        <input type="number" class="form-control vat" value="0" onchange="updateRow(${rowIndex})">
      </td>

      <td class="total">0.00</td>

    </tr>
  `;

  currentItems.push({
    product_id: "",
    name: "",
    quantity: 1,
    price: 0,
    vat_rate: 0,
    total: 0
  });
}

function selectProduct(index, productId) {

  const product = allProducts.find(p => p.id == productId);

  if (!product) return;

  const row = document.getElementById(`row-${index}`);

  row.querySelector(".price").value = product.price;
  row.querySelector(".vat").value = product.vat_rate;

  currentItems[index].product_id = product.id;
  currentItems[index].name = product.name;

  updateRow(index);
}

function updateRow(index) {

  const row = document.getElementById(`row-${index}`);

  const qty = Number(row.querySelector(".qty").value);
  const price = Number(row.querySelector(".price").value);
  const vat = Number(row.querySelector(".vat").value);

  const total = (qty * price) + ((qty * price * vat) / 100);

  row.querySelector(".total").innerText = total.toFixed(2);

  currentItems[index].quantity = qty;
  currentItems[index].price = price;
  currentItems[index].vat_rate = vat;
  currentItems[index].total = total;

  updateSummary();
}

function updateSummary() {

  let total = 0;

  currentItems.forEach(i => {
    total += i.total;
  });

  document.getElementById("finalTotal").innerText = total.toFixed(2);
}

async function saveInvoice() {

  const customerSelect = document.getElementById("customerSelect");

  const customer_id = customerSelect.value;

  if (!customer_id) {
    alert("اختر العميل");
    return;
  }

  const customer_name =
    customerSelect.options[customerSelect.selectedIndex].text;

  const payload = {

    action: "saveInvoice",

    customer_id,
    customer_name,

    date: document.getElementById("invoiceDate").value,

    discount: 0,

    paidAmount: 0,

    paymentMethod: "cash",

    items: currentItems
  };

  const res = await apiCall(
    "saveInvoice",
    "POST",
    payload
  );

  if (res && res.success) {

    alert("تم حفظ الفاتورة");

    location.reload();

  } else {

    alert(res.error || "حدث خطأ");
  }
}

window.addEventListener("DOMContentLoaded", async () => {

  document.getElementById("invoiceDate").valueAsDate = new Date();

  await loadProducts();

  await loadCustomers();

  addRow();
});

</script>

</body>
</html>
```
